<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>repo-wiki</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <nav id="sidebar" aria-label="Wiki navigation">
    <div id="sidebar-header">
      <button class="sidebar-title sidebar-home-btn" id="sidebar-home-btn" title="Home (root INDEX.md)" aria-label="Home — open root INDEX.md">repo-wiki</button>
      <div id="search-box">
        <input id="search-input" type="search" placeholder="Search…" aria-label="Search wiki" autocomplete="off" />
      </div>
    </div>
    <div id="search-results" aria-live="polite" hidden></div>
    <div id="tree" role="tree" aria-label="Pages">
      <div class="tree-loading">Loading…</div>
    </div>
  </nav>
  <main id="content">
    <div id="content-inner">
      <p class="welcome">Select a page from the sidebar.</p>
    </div>
  </main>
  <script src="/marked.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
